<svg width="130" height="50" viewBox="0 0 130 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- J-2案: 上の線は左から右へフェードアウト、下の線は右から左へフェードアウト -->
  <line x1="10" y1="8" x2="110" y2="8" stroke="url(#j2Top)" stroke-width="1.5"/>
  <text x="18" y="35" font-family="'Inter', sans-serif" font-size="28" font-weight="600" fill="#F8FAFC" letter-spacing="0.4em">ITO</text>
  <line x1="10" y1="42" x2="110" y2="42" stroke="url(#j2Bottom)" stroke-width="1.5"/>
  <defs>
    <linearGradient id="j2Top" x1="10" y1="0" x2="110" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="j2Bottom" x1="10" y1="0" x2="110" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
</svg>
