<svg width="200" height="75" viewBox="0 0 200 75" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal bracket accent -->
  <text x="8" y="50" font-family="'Inter', 'Consolas', monospace" font-size="36" font-weight="300" fill="#2563EB" letter-spacing="0.02em">&gt;</text>

  <!-- Main text "Ito" -->
  <text x="32" y="50" font-family="'Inter', 'Consolas', monospace" font-size="36" font-weight="700" fill="#F8FAFC" letter-spacing="0.05em">Ito</text>

  <!-- Cursor blink line -->
  <rect x="105" y="22" width="3" height="32" rx="1" fill="#2563EB">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="33" y="66" font-family="'Inter', 'Consolas', monospace" font-size="11" font-weight="400" fill="#64748B" letter-spacing="0.25em">PORTFOLIO</text>
</svg>
